name: Build and Release

permissions:
  contents: write
  actions: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  SDK_URL: https://immortalwrt.kyarucloud.moe/releases/25.12-SNAPSHOT/targets/qualcommax/ipq60xx/immortalwrt-sdk-25.12-SNAPSHOT-qualcommax-ipq60xx_gcc-14.3.0_musl.Linux-x86_64.tar.zst

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget zstd

      - name: Download and Extract SDK
        run: |
          wget -qO- "$SDK_URL" | tar --zstd -xf -
          mv immortalwrt-sdk-* sdk

      - name: Prepare Feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Package
        run: |
          mkdir -p sdk/package/fancontrol-packages
          cp -r fancontrol sdk/package/fancontrol-packages/
          cp -r luci-app-fancontrol sdk/package/fancontrol-packages/

      - name: Compile
        working-directory: sdk
        run: |
          echo "CONFIG_PACKAGE_fancontrol=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-fancontrol=y" >> .config
          make defconfig
          make package/fancontrol-packages/fancontrol/compile V=s || echo "Fancontrol compile failed"
          make package/fancontrol-packages/luci-app-fancontrol/compile V=s || echo "Luci app compile failed"

      - name: Organize Artifacts
        run: |
          mkdir -p artifacts
          # 查找所有 apk 文件，排除 SDK 自带的包，只保留我们编译的
          find sdk/bin -name "fancontrol*.apk" -exec cp {} artifacts/ \;
          find sdk/bin -name "luci-app-fancontrol*.apk" -exec cp {} artifacts/ \;
          find sdk/bin -name "luci-i18n-fancontrol*.apk" -exec cp {} artifacts/ \;
          ls -R artifacts/

      - name: Generate Release Tag
        id: tag
        run: |
          DATE=$(date +'%Y.%m.%d-%H%M')
          VERSION=$(grep '^PKG_VERSION:=' fancontrol/Makefile | awk -F':=' '{print $2}' | xargs)
          RELEASE_TAG="${DATE}-v${VERSION}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Generated release tag: $RELEASE_TAG"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ steps.tag.outputs.release_tag }}
          path: artifacts/

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  delete_runs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
